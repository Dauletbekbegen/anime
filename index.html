	<meta charset="UTF-8">

	<title>W-Anime</title>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			transition: 0.3s;
		}

		body.light {
			background: #f5f5f5;
			color: #222;
		}

		body.dark {
			background: #121212;
			color: #fff;
		}

		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 15px 30px;
			background: linear-gradient(90deg, #9303C5, #02060E);
			color: white;
		}

		.nav a {
			margin: 0 10px;
			text-decoration: none;
			color: white;
			font-weight: bold;
		}

		.search {
			padding: 8px;
			border-radius: 8px;
			border: none;
			outline: none;
		}

		.theme-btn {
			padding: 8px 15px;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			margin-left: 10px;
			background: white;
		}

		main {
			padding: 20px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
			gap: 20px;
		}

		.card {
			background: white;
			border-radius: 15px;
			overflow: hidden;
			box-shadow: 0 5px 15px rgba(0,0,0,0.1);
			transition: 0.3s;
		}

		body.dark .card {
			background: #9303C5;
		}

		.card img {
			width: 100%;
			height: 250px;
			object-fit: cover;
		}

		.card h3 {
			margin: 10px;
		}

		.card button {
			margin: 10px;
			width: calc(100% - 20px);
			background: #02060E;
			color: white;
			padding: 10px;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			font-weight: bold;
			transition: background 0.3s;
		}

		.card button:hover {
			background: #e04022;
		}

		.card:hover {
			transform: translateY(-5px);
		}

		
		#player-section {
			display: none;
			padding: 20px;
			max-width: 900px;
			margin: 0 auto;
		}

		.back-btn {
			background: #555;
			color: white;
			padding: 10px 15px;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			margin-bottom: 20px;
			font-weight: bold;
		}

		.back-btn:hover {
			background: #333;
		}

		.iframe-container {
			position: relative;
			padding-bottom: 56.25%;
			height: 0;
			border-radius: 10px;
			overflow: hidden;
			background: #000;
		}

		.iframe-container iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}

		.episode-buttons {
			display: flex;
			gap: 10px;
			margin-top: 15px;
			flex-wrap: wrap;
		}

		.ep-btn {
			padding: 8px 15px;
			background: #2f3542;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			transition: 0.3s;
			font-weight: bold;
		}

		.ep-btn:hover {
			background: #57606f;
		}

		.ep-btn.active {
			background: #ff512f;
		}
	</style>
</head>

	const list = document.getElementById('animeList');
	const search = document.getElementById('search');
	const themeBtn = document.getElementById('themeBtn');

	function render(data) {
		list.innerHTML = "";
		data.forEach(a => {
			list.innerHTML += `
				<div class="card">
					<img src="${a.img}" alt="${a.title}">
					<h3>${a.title}</h3>
					<button onclick="openPlayer(${a.id})">Смотреть</button>
				</div>
			`;
		});
	}

	search.addEventListener("input", () => {
		const value = search.value.toLowerCase();
		const filtered = anime.filter(a => a.title.toLowerCase().includes(value));
		render(filtered);
	});

	function toggleTheme() {
		document.body.classList.toggle('dark');
		if (document.body.classList.contains('dark')) {
			themeBtn.textContent = '☀️';
		} else {
			themeBtn.textContent = '🌙';
		}
	}

	function openPlayer(id) {
		const selectedAnime = anime.find(a => a.id === id);

		if (selectedAnime && selectedAnime.episodes) {
			document.getElementById('catalog-section').style.display = 'none';
			document.getElementById('player-section').style.display = 'block';
			document.getElementById('player-title').innerText = selectedAnime.title;
			
		
			loadEpisode(selectedAnime.episodes[0].src, 0, selectedAnime.episodes);
		} 
		
		else if (selectedAnime && selectedAnime.link) {
			window.open(selectedAnime.link, '_blank');
		} else {
			alert("Видео әлі қосылмаған!");
		}
	}

	
	function loadEpisode(src, activeIndex, episodes) {
		const iframe = document.getElementById('video-iframe');
		const btnContainer = document.getElementById('episode-buttons');
		
		iframe.src = src; 
		btnContainer.innerHTML = ''; 

		
		episodes.forEach((ep, index) => {
			const btn = document.createElement('button');
			btn.innerText = ep.title;
			btn.className = index === activeIndex ? 'ep-btn active' : 'ep-btn';
			btn.onclick = () => loadEpisode(ep.src, index, episodes);
			btnContainer.appendChild(btn);
		});
	}

	
	function closePlayer() {
		document.getElementById('video-iframe').src = ''; 
		document.getElementById('catalog-section').style.display = 'block';
		document.getElementById('player-section').style.display = 'none';
	}

	
	render(anime);

</script>

</body>
</html>
